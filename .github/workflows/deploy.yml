name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 13.223.77.71
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            APP_DIR="/home/ubuntu/ai-gateway-poc"
            PUBLIC_HOST="13.223.77.71"

            # Clone if not a git repo, otherwise pull
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "=== Cloning repository ==="
              rm -rf "$APP_DIR"
              git clone https://github.com/vram-alt/AgentsFlow-gateway.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Ensuring .env exists ==="
            if [ ! -f .env ] || grep -q "CHANGE_ME" .env; then
              echo "Creating/regenerating .env from template..."
              cp .env.example .env
              WEBHOOK_SECRET=$(python3 -c "import secrets; print(secrets.token_urlsafe(24))")
              ENCRYPTION_KEY=$(python3 -c "from base64 import urlsafe_b64encode; import os; print(urlsafe_b64encode(os.urandom(32)).decode())")
              sed -i "s|WEBHOOK_SECRET=CHANGE_ME_webhook_secret_min16chars|WEBHOOK_SECRET=${WEBHOOK_SECRET}|" .env
              sed -i "s|ENCRYPTION_KEY=CHANGE_ME_generate_new_fernet_key_44chars|ENCRYPTION_KEY=${ENCRYPTION_KEY}|" .env
              sed -i "s|CORS_ORIGINS=http://localhost:3000|CORS_ORIGINS=http://${PUBLIC_HOST}:3000|" .env
              sed -i "s|NEXT_PUBLIC_API_URL=http://127.0.0.1:8000|NEXT_PUBLIC_API_URL=http://${PUBLIC_HOST}:8000|" .env
              echo "Generated .env with real secrets"
            fi

            echo "=== Validating .env ==="
            echo "ENCRYPTION_KEY length: $(grep '^ENCRYPTION_KEY=' .env | cut -d= -f2 | tr -d '\n' | wc -c)"
            echo "WEBHOOK_SECRET length: $(grep '^WEBHOOK_SECRET=' .env | cut -d= -f2 | tr -d '\n' | wc -c)"
            echo "CORS_ORIGINS: $(grep '^CORS_ORIGINS=' .env | cut -d= -f2)"
            echo "NEXT_PUBLIC_API_URL: $(grep '^NEXT_PUBLIC_API_URL=' .env | cut -d= -f2)"
            if grep -q "CHANGE_ME" .env; then
              echo "❌ ERROR: .env still contains placeholder values!"
              exit 1
            fi

            echo "=== Building and deploying ==="
            docker compose build
            docker compose down
            docker compose up -d

            echo "=== Waiting for health check ==="
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "✅ Backend is healthy"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "❌ Health check failed after 30 attempts"
                docker compose logs --tail=50 backend
                exit 1
              fi
              sleep 2
            done

            echo "=== Post-deploy verification ==="
            AUTH=$(echo -n "gateway_operator:Str0ng!Pass#2024" | base64)
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" -H "Authorization: Basic $AUTH" http://localhost:8000/api/providers/)
            echo "GET /api/providers/ => HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" != "200" ]; then
              echo "⚠️ Providers endpoint returned $HTTP_CODE — dumping logs:"
              docker compose logs --tail=30 backend
            fi

            echo "=== Cleaning up old images ==="
            docker image prune -f

            echo "✅ Deployment complete"
